<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Country Info App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🌍 Country Info App</h1>
    <p class="subtitle">Search any country in the world</p>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="e.g. India, Japan, Brazil..." />
      <button onclick="searchCountry()">Search</button>
    </div>

    <div id="result"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
